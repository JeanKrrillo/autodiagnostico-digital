<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanzador de Aplicaciones - Inventario de Autenticación</title>
    <!-- Tailwind CSS para diseño rápido y de alta calidad -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Outfit para una tipografía ultra moderna -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body
    class="min-h-screen bg-gradient-to-tr from-slate-50 via-white to-slate-50 text-slate-800 antialiased selection:bg-indigo-100 selection:text-indigo-900">

    <div class="max-w-7xl mx-auto px-6 py-12 md:py-20 flex flex-col items-center">

        <!-- Cabecera principal -->
        <header class="text-center mb-12 max-w-2xl mx-auto">
            <h1
                class="text-4xl md:text-5xl font-black text-slate-900 tracking-tight leading-tight bg-gradient-to-r from-slate-900 via-indigo-950 to-slate-900 bg-clip-text text-transparent">
                Consola de Accesos
            </h1>
            <p class="mt-3 text-xs md:text-sm text-slate-500 font-semibold tracking-wide uppercase">
                Inventario de Autenticación y Seguridad
            </p>
            <div class="w-16 h-1 bg-indigo-600 mx-auto mt-4 rounded-full" />
        </header>

        <!-- Controles de búsqueda y filtros -->
        <section
            class="w-full max-w-4xl mb-12 flex flex-col md:flex-row gap-4 items-center justify-between bg-white border border-slate-100 p-4 rounded-2xl shadow-sm">
            <!-- Entrada de Búsqueda -->
            <div class="relative w-full md:max-w-md">
                <input type="text" id="search-input" placeholder="Buscar aplicación..."
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-4 pr-4 py-2.5 text-sm font-medium focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:outline-none placeholder:text-slate-400 text-slate-800 transition-all" />
            </div>

            <!-- Filtros de Categorías -->
            <div class="flex flex-wrap items-center gap-1.5 w-full md:w-auto">
                <button onclick="filterCategory('all')" id="btn-all"
                    class="category-btn text-xs font-bold px-4 py-2.5 rounded-xl border transition-all bg-slate-900 text-white border-slate-900 shadow-sm">
                    Todas
                </button>
                <button onclick="filterCategory('critical')" id="btn-critical"
                    class="category-btn text-xs font-bold px-4 py-2.5 rounded-xl border transition-all bg-white border-slate-200 hover:bg-slate-50 text-slate-700">
                    🚨 Críticas
                </button>
                <button onclick="filterCategory('moderate')" id="btn-moderate"
                    class="category-btn text-xs font-bold px-4 py-2.5 rounded-xl border transition-all bg-white border-slate-200 hover:bg-slate-50 text-slate-700">
                    ⚠️ Moderadas
                </button>
                <button onclick="filterCategory('low')" id="btn-low"
                    class="category-btn text-xs font-bold px-4 py-2.5 rounded-xl border transition-all bg-white border-slate-200 hover:bg-slate-50 text-slate-700">
                    🍿 Bajo Impacto
                </button>
            </div>
        </section>

        <!-- Grid de Aplicaciones -->
        <main id="apps-grid"
            class="w-full grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 xl:grid-cols-9 gap-6 md:gap-8 justify-center items-start">
            <!-- Las tarjetas de app se inyectarán dinámicamente aquí -->
        </main>

        <!-- Estado vacío si no hay resultados -->
        <div id="empty-state" class="hidden text-center py-16">
            <p class="text-slate-500 font-semibold text-lg">No se encontraron aplicaciones</p>
            <p class="text-slate-400 text-sm mt-1">Intenta ajustando el filtro o el término de búsqueda.</p>
        </div>

    </div>

            { name: 'Notion', slug: 'notion', color: '#000000', weight: 3, category: 'moderate' },
            { name: 'Rappi', slug: 'rappi', color: '#FF441F', weight: 3, category: 'moderate' },
            { name: 'Reddit', slug: 'reddit', color: '#FF4500', weight: 3, category: 'moderate' },
            { name: 'Telegram', slug: 'telegram', color: '#24A1DE', weight: 3, category: 'moderate' },
            { name: 'TikTok', slug: 'tiktok', color: '#000000', weight: 3, category: 'moderate' },
            { name: 'Trello', slug: 'trello', color: '#0079BF', weight: 3, category: 'moderate' },
            { name: 'Uber', slug: 'uber', color: '#000000', weight: 3, category: 'moderate' },
            { name: 'Volaris', slug: 'volaris', color: '#000000', weight: 3, category: 'moderate' },
            { name: 'Walmart', slug: 'walmart', color: '#0071CE', weight: 3, category: 'moderate' },
            { name: 'X (Twitter)', slug: 'x', color: '#000000', weight: 3, category: 'moderate' },
            { name: 'Yahoo!', slug: 'yahoo', color: '#6001D2', weight: 3, category: 'moderate' },
            { name: 'Zoom', slug: 'zoom', color: '#2D8CFF', weight: 3, category: 'moderate' },

            // 🍿 Aplicaciones de Impacto Bajo (Peso: 1)
            { name: 'Disney+', slug: 'disneyplus', color: '#113CCF', weight: 1, category: 'low' },
            { name: 'Dropbox', slug: 'dropbox', color: '#0061FE', weight: 1, category: 'low' },
            { name: 'Epic Games', slug: 'epicgames', color: '#313131', weight: 1, category: 'low' },
            { name: 'Evernote', slug: 'evernote', color: '#00A82D', weight: 1, category: 'low' },
            { name: 'Netflix', slug: 'netflix', color: '#E50914', weight: 1, category: 'low' },
            { name: 'Nintendo', slug: 'nintendo', color: '#E60012', weight: 1, category: 'low' },
            { name: 'Pinterest', slug: 'pinterest', color: '#BD081C', weight: 1, category: 'low' },
            { name: 'Roblox', slug: 'roblox', color: '#000000', weight: 1, category: 'low' },
            { name: 'Shazam', slug: 'shazam', color: '#0088FF', weight: 1, category: 'low' },
            { name: 'Shein', slug: 'shein', color: '#000000', weight: 1, category: 'low' },
            { name: 'Snapchat', slug: 'snapchat', color: '#FFFC00', weight: 1, category: 'low' },
            { name: 'Spotify', slug: 'spotify', color: '#1DB954', weight: 1, category: 'low' },
            { name: 'Steam', slug: 'steam', color: '#1b2838', weight: 1, category: 'low' },
            { name: 'Temu', slug: 'temu', color: '#FF6600', weight: 1, category: 'low' },
            { name: 'Twitch', slug: 'twitch', color: '#9146FF', weight: 1, category: 'low' },
            { name: 'Xbox', slug: 'xbox', color: '#107C10', weight: 1, category: 'low' },
            { name: 'YouTube', slug: 'youtube', color: '#FF0000', weight: 1, category: 'low' }
        ];

        // Variables de estado
        let activeCategory = 'all';
        let searchQuery = '';

        // Referencias a elementos
        const grid = document.getElementById('apps-grid');
        const searchInput = document.getElementById('search-input');
        const emptyState = document.getElementById('empty-state');

        // Función para calcular iniciales en caso de fallo
        function getInitials(name) {
            return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
        }

        // Manejo de errores de imagen (fallback a iniciales)
        function handleImgError(imgElement, name) {
            const container = imgElement.parentElement;
            const initials = getInitials(name);
            container.innerHTML = `<span class="text-white text-xs font-bold tracking-wider select-none">${initials}</span>`;
        }

        // Renderizar la cuadrícula
        function renderGrid() {
            // Limpiar contenedor
            grid.innerHTML = '';

            // Filtrar aplicaciones
            const filtered = APPS_DATA.filter(app => {
                const matchesSearch = app.name.toLowerCase().includes(searchQuery.toLowerCase());
                const matchesCategory = activeCategory === 'all' || app.category === activeCategory;
                return matchesSearch && matchesCategory;
            });

            // Mostrar estado vacío si no hay resultados
            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
            }

            // Generar elementos HTML
            filtered.forEach(app => {
                const card = document.createElement('div');
                card.className = 'flex flex-col items-center gap-2.5 group cursor-pointer w-full text-center';

                const iconContainer = document.createElement('div');
                iconContainer.className = 'aspect-square w-full rounded-2xl flex items-center justify-center relative overflow-hidden shrink-0 border border-slate-200/40 shadow-sm select-none transition-all duration-300 ease-out';
                iconContainer.style.backgroundColor = app.color;

                // Efectos dinámicos de glow interactivos en hover usando su color nativo
                iconContainer.onmouseenter = () => {
                    iconContainer.style.transform = 'scale(1.06)';
                    iconContainer.style.boxShadow = `0 10px 25px -5px ${app.color}50, 0 8px 10px -6px ${app.color}50`;
                };
                iconContainer.onmouseleave = () => {
                    iconContainer.style.transform = '';
                    iconContainer.style.boxShadow = '';
                };

                // Inyectar logo (unificamos Mercado Libre y Mercado Pago bajo el mismo logo)
                const logoSlug = app.slug === 'mercadolibre' ? 'mercadopago' : app.slug;
                if (CUSTOM_SVGS[logoSlug]) {
                    iconContainer.innerHTML = CUSTOM_SVGS[logoSlug];
                } else {
                    const cdnUrl = `https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/${logoSlug}.svg`;
                    iconContainer.innerHTML = `<img src="${cdnUrl}" alt="${app.name}" class="w-full h-full p-[23%] object-contain filter invert brightness-200" onerror="handleImgError(this, '${app.name}')" />`;
                }

                // Crear etiqueta del nombre
                const label = document.createElement('span');
                label.className = 'text-[10px] md:text-xs font-semibold text-slate-500 group-hover:text-slate-900 transition-colors duration-200 truncate w-full px-1 select-none';
                label.textContent = app.name;

                card.appendChild(iconContainer);
                card.appendChild(label);
                grid.appendChild(card);
            });
        }

        // Filtrar por categoría
        window.filterCategory = function (category) {
            activeCategory = category;

            // Actualizar estilos de los botones
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.className = 'category-btn text-xs font-bold px-4 py-2.5 rounded-xl border transition-all bg-white border-slate-200 hover:bg-slate-50 text-slate-700';
            });

            const activeBtn = document.getElementById(`btn-${category}`);
            if (activeBtn) {
                if (category === 'all') {
                    activeBtn.className = 'category-btn text-xs font-bold px-4 py-2.5 rounded-xl border transition-all bg-slate-900 text-white border-slate-900 shadow-sm';
                } else if (category === 'critical') {
                    activeBtn.className = 'category-btn text-xs font-bold px-4 py-2.5 rounded-xl border transition-all bg-red-500 text-white border-red-500 shadow-sm';
                } else if (category === 'moderate') {
                    activeBtn.className = 'category-btn text-xs font-bold px-4 py-2.5 rounded-xl border transition-all bg-amber-500 text-white border-amber-500 shadow-sm';
                } else if (category === 'low') {
                    activeBtn.className = 'category-btn text-xs font-bold px-4 py-2.5 rounded-xl border transition-all bg-blue-500 text-white border-blue-500 shadow-sm';
                }
            }

            renderGrid();
        }

        // Escuchar cambios en la búsqueda
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderGrid();
        });

        // Renderizado inicial
        renderGrid();
    </script>
</body>
